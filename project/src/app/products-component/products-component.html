<input [(ngModel)]="productTitle" name="title" placeholder="Product Title" />

<input [(ngModel)]="productPrice" name="price" type="number" placeholder="Price" />

<button (click)="addProduct()">Add Product</button>

<ul>
  @for(product of products; track product.id){
    <li>{{ product.title }} - {{ product.price }}</li>
  }
</ul>
